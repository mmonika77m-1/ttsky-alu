project:
  title:        "ALU"
  author:       "Monika"
  discord:      ""
  description:  "8-bit Arithmetic Logic Unit supporting add, sub, and, or, xor"
  language:     "Verilog"
  clock_hz:     0

  tiles: "1x1"

  top_module:  "tt_um_example"

  source_files:
    - "project.v"

pinout:
  # Inputs (8-bit total)
  ui[0]: "A0 (LSB of operand A)"
  ui[1]: "A1"
  ui[2]: "A2"
  ui[3]: "A3"
  ui[4]: "B0 (LSB of operand B)"
  ui[5]: "B1"
  ui[6]: "OP0 (operation select)"
  ui[7]: "OP1 (operation select)"

  # Outputs (8-bit result)
  uo[0]: "Result bit 0 (LSB)"
  uo[1]: "Result bit 1"
  uo[2]: "Result bit 2"
  uo[3]: "Result bit 3"
  uo[4]: "Result bit 4"
  uo[5]: "Result bit 5"
  uo[6]: "Result bit 6"
  uo[7]: "Result bit 7 (MSB)"

  # Bidirectional (unused)
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

yaml_version: 6
